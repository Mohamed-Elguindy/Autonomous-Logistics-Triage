services:
  # 1. The Python AI Agent
  brain-api:
    build: ./brain-fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./brain-fastapi:/app
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - supply-chain-network

  # 2. The Node.js Server
  face-backend:
    build: ./backend-node # Changed to match your screenshot
    ports:
      - "5000:5000"
    volumes:
      - ./backend-node:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - FASTAPI_URL=http://brain-api:8000
      - DATABASE_URL=${DATABASE_URL}
    command: npx nodemon src/server.js
    networks:
      - supply-chain-network
    depends_on:
      - brain-api

  # 3. The React Frontend
  face-frontend:
    build: 
      context: ./frontend # Changed to match your screenshot
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    networks:
      - supply-chain-network
    depends_on:
      - face-backend

networks:
  supply-chain-network:
    driver: bridge